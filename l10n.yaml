# Flutter l10n configuration.
# The `flutter pub get` + `flutter gen-l10n` commands (or `flutter run`)
# will read this file and generate lib/generated/l10n/ from the ARB files.

arb-dir: lib/l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart
output-dir: lib/l10n
nullable-getter: false
